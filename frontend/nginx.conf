# Rate-limit zone for /scan. Keyed on client IP, 10 MB of state
# (= ~160k unique IPs), 10 req/s sustained. Burst absorbs short spikes.
limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=10r/s;

# Don't disclose the nginx version on error pages.
server_tokens off;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cap request bodies early — the /scan endpoint's own Jakarta validation
  # maxes out at 50k chars of input; 128k leaves room for JSON overhead.
  client_max_body_size 128k;

  # Security headers. CSP allows inline styles because Tailwind ships them;
  # everything else is same-origin only. frame-ancestors 'none' prevents
  # clickjacking. HSTS is belt-and-braces with Cloudflare's edge TLS.
  #
  # These sit at server level so the SPA fallback inherits them. Any
  # location block that declares its own `add_header` must re-declare them
  # (nginx add_header has reset-on-redefinition semantics), so the
  # `/index.html` block below also sets them explicitly.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'" always;

  # Proxy /scan to the backend over the compose network. Rate-limited per IP
  # so a single client can't pin the LLM judge path. /audit is intentionally
  # NOT proxied — it's reachable only from inside the compose network, and
  # an operator can curl it via Tailscale for investigation.
  location /scan {
    limit_req zone=scan_limit burst=20 nodelay;
    proxy_pass http://backend:8080/scan;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # /audit is intentionally not publicly exposed. Return 404 rather than
  # letting it fall through to the SPA — makes the boundary explicit.
  location /audit {
    return 404;
  }
  location /actuator {
    return 404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache static assets; short-cache index.html.
  # `expires` is not `add_header`, so the static-asset block keeps inheriting
  # the server-level security headers above.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    access_log off;
  }

  # /index.html needs Cache-Control, but any add_header inside a location
  # drops inheritance — so re-declare the security headers here.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'" always;
  }
}
