<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>prompt-shield — live demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Live demo of prompt-shield-java — a Spring Boot microservice for LLM prompt-injection defence.">
  <meta name="theme-color" content="#0b0d12">
  <script>
    // Apply stored theme override before first paint to avoid FOUC.
    // Cookie (.omayoglu.com) is the cross-subdomain source of truth so
    // the preference carries between the main site and this demo;
    // localStorage is a same-origin fallback.
    (function () {
      try {
        var m = document.cookie.match(/(?:^|;\s*)theme=(light|dark)(?:;|$)/);
        var t = m ? m[1] : localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased">
  <app-root></app-root>
</body>
</html>
